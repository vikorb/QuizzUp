        username:
          type: string
          example: enzod
        email:
          type: string
          format: email
          example: enzo@quizzup.fr
        status:
          $ref: "#/components/schemas/Status"
        createdAt:
          type: string
          format: date-time
          example: "2026-05-19T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-05-19T10:00:00.000Z"
        deletedAt:
          type: string
          format: date-time
          nullable: true
          example: null

    CreateAccountRequest:
