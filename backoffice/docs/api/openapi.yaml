openapi: 3.0.3

info:
  title: QuizzUp Backoffice API
  version: 1.0.0
  description: |
    Documentation API du backoffice QuizzUp.

    Chaque route contient un champ `x-availability` :
    - `disponible` : route implémentée côté API
    - `non_disponible` : route prévue mais pas encore implémentée

servers:
  - url: http://localhost:3001
    description: API locale

tags:
  - name: Health
    description: Vérification de disponibilité de l'API
  - name: Auth
    description: Authentification administrateur
  - name: Me
    description: Informations de l'utilisateur connecté
  - name: Companies
    description: Gestion des compagnies
  - name: Accounts
    description: Gestion des comptes administrateurs rattachés aux compagnies

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags:
        - Health
      summary: "[DISPONIBLE] Vérifier l'état de l'API"
      description: |
        Statut : **Disponible**

        Permet de vérifier que l'API répond correctement.
      operationId: getHealth
      x-availability: disponible
      security: []
      responses:
        "200":
          description: API disponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /login:
    post:
      tags:
        - Auth
      summary: "[DISPONIBLE] Connexion administrateur"
      description: |
        Statut : **Disponible**

        Permet à un administrateur de se connecter avec son email ou son nom d'utilisateur.
      operationId: login
      x-availability: disponible
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              loginWithEmail:
                summary: Connexion avec email
                value:
                  identifier: admin@quizzup.fr
                  password: password123
              loginWithUsername:
                summary: Connexion avec username
                value:
                  identifier: admin
                  password: password123
      responses:
        "200":
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Corps de requête invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "401":
          description: Identifiants invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /logout:
    post:
      tags:
        - Auth
      summary: "[DISPONIBLE] Déconnexion administrateur"
      description: |
        Statut : **Disponible**

        Révoque la session courante de l'administrateur connecté.
      operationId: logout
      x-availability: disponible
      responses:
        "200":
          description: Déconnexion réussie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me:
    get:
      tags:
        - Me
      summary: "[DISPONIBLE] Récupérer l'utilisateur connecté"
      description: |
        Statut : **Disponible**

        Retourne les informations de l'administrateur connecté à partir du token JWT.
      operationId: getMe
      x-availability: disponible
      responses:
        "200":
          description: Utilisateur connecté récupéré
          content:
            application/json:
              schema:
                type: object
                properties:
                  admin:
                    $ref: "#/components/schemas/MeAdmin"
        "401":
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Administrateur introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /companies:
    get:
      tags:
        - Companies
      summary: "[DISPONIBLE] Lister les compagnies"
      description: |
        Statut : **Disponible**

        Liste les compagnies.

        Règles :
        - un admin global peut voir toutes les compagnies ;
        - un compte non admin ne voit que sa propre compagnie si elle n'est pas supprimée.
      operationId: listCompanies
      x-availability: disponible
      responses:
        "200":
          description: Liste des compagnies
          content:
            application/json:
              schema:
                type: object
                properties:
                  companies:
                    type: array
                    items:
                      $ref: "#/components/schemas/Company"
        "401":
          description: Token manquant ou invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - Companies
      summary: "[DISPONIBLE] Créer une compagnie"
      description: |
        Statut : **Disponible**

        Crée une nouvelle compagnie.

        Accès : réservé au rôle `admin`.
      operationId: createCompany
      x-availability: disponible
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyRequest"
      responses:
        "201":
          description: Compagnie créée
          content:
            application/json:
              schema:
                type: object
                properties:
                  company:
                    $ref: "#/components/schemas/Company"
        "400":
          description: Corps de requête invalide
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Accès interdit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email ou nom déjà utilisé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /companies/{id}:
    get:
      tags:
        - Companies
      summary: "[DISPONIBLE] Récupérer une compagnie"
      description: |
        Statut : **Disponible**

        Récupère une compagnie par son identifiant.

        Règles :
        - un admin global peut accéder à toutes les compagnies ;
        - un compte non admin ne peut accéder qu'à sa propre compagnie.
      operationId: getCompanyById
      x-availability: disponible
      parameters:
        - $ref: "#/components/parameters/CompanyId"
      responses:
        "200":
          description: Compagnie récupérée
          content:
            application/json:
              schema:
                type: object
                properties:
                  company:
                    $ref: "#/components/schemas/Company"
        "400":
          description: Paramètres invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Accès interdit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Compagnie introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags:
        - Companies
      summary: "[DISPONIBLE] Modifier une compagnie"
      description: |
        Statut : **Disponible**

        Modifie une compagnie.

        Accès : réservé au rôle `admin`.
      operationId: updateCompany
      x-availability: disponible
      parameters:
        - $ref: "#/components/parameters/CompanyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCompanyRequest"
      responses:
        "200":
          description: Compagnie modifiée
          content:
            application/json:
              schema:
                type: object
                properties:
                  company:
                    $ref: "#/components/schemas/Company"
        "400":
          description: Paramètres ou corps de requête invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Accès interdit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Compagnie introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email ou nom déjà utilisé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /companies/{id}/status:
    patch:
      tags:
        - Companies
      summary: "[DISPONIBLE] Modifier le statut d'une compagnie"
      description: |
        Statut : **Disponible**

        Met à jour uniquement le statut d'une compagnie.

        Statuts :
        - `0` : inactive
        - `1` : active
        - `2` : supprimée

        Si le statut passe à `2`, `deletedAt` est renseigné.
      operationId: updateCompanyStatus
      x-availability: disponible
      parameters:
        - $ref: "#/components/parameters/CompanyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusRequest"
      responses:
        "200":
          description: Statut de la compagnie modifié
          content:
            application/json:
              schema:
                type: object
                properties:
                  company:
                    $ref: "#/components/schemas/Company"
        "400":
          description: Paramètres ou corps de requête invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Accès interdit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Compagnie introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /companies/{id}/permanent:
    delete:
      tags:
        - Companies
      summary: "[DISPONIBLE] Supprimer une compagnie"
      description: |
        Statut : **Disponible**

        Supprime une compagnie de manière logique.

        Important :
        malgré le nom de route `/permanent`, l'API actuelle ne supprime pas physiquement la ligne.
        Elle passe la compagnie au statut `2` et renseigne `deletedAt`.

        Accès : réservé au rôle `admin`.
      operationId: deleteCompany
      x-availability: disponible
      parameters:
        - $ref: "#/components/parameters/CompanyId"
      responses:
        "200":
          description: Compagnie supprimée logiquement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteCompanyResponse"
        "400":
          description: Paramètres invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Accès interdit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Compagnie introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /companies/{id}/admins:
    get:
      tags:
        - Accounts
      summary: "[DISPONIBLE] Lister les comptes d'une compagnie"
      description: |
        Statut : **Disponible**

        Liste les comptes administrateurs rattachés à une compagnie.

        Règles :
        - un admin global peut accéder à toutes les compagnies ;
        - un compte non admin peut accéder aux comptes de sa propre compagnie.
      operationId: listCompanyAccounts
      x-availability: disponible
      parameters:
        - $ref: "#/components/parameters/CompanyId"
      responses:
        "200":
          description: Liste des comptes
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Account"
        "400":
          description: Paramètres invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Accès interdit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Compagnie introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /companies/{companyId}/admins:
    post:
      tags:
        - Accounts
      summary: "[DISPONIBLE] Créer un compte"
      description: |
        Statut : **Disponible**

        Crée un compte administrateur dans une compagnie.

        Accès : réservé au rôle `admin`.
      operationId: createCompanyAccount
      x-availability: disponible
      parameters:
        - $ref: "#/components/parameters/CompanyIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "201":
          description: Compte créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: "#/components/schemas/Account"
        "400":
          description: Paramètres ou corps de requête invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Accès interdit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Compagnie introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email ou username déjà utilisé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /companies/{companyId}/admins/{adminId}:
    get:
      tags:
        - Accounts
      summary: "[DISPONIBLE] Récupérer un compte"
      description: |
        Statut : **Disponible**

        Récupère un compte administrateur par son identifiant.

        Accès : réservé au rôle `admin`.
      operationId: getCompanyAccountById
      x-availability: disponible
      parameters:
        - $ref: "#/components/parameters/CompanyIdParam"
        - $ref: "#/components/parameters/AdminId"
      responses:
        "200":
          description: Compte récupéré
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: "#/components/schemas/Account"
        "400":
          description: Paramètres invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Accès interdit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Compagnie ou compte introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags:
        - Accounts
      summary: "[DISPONIBLE] Modifier un compte"
      description: |
        Statut : **Disponible**

        Modifie les informations d'un compte administrateur.

        Accès : réservé au rôle `admin`.
      operationId: updateCompanyAccount
      x-availability: disponible
      parameters:
        - $ref: "#/components/parameters/CompanyIdParam"
        - $ref: "#/components/parameters/AdminId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          description: Compte modifié
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: "#/components/schemas/Account"
        "400":
          description: Paramètres ou corps de requête invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Accès interdit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Compagnie ou compte introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email ou username déjà utilisé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - Accounts
      summary: "[DISPONIBLE] Supprimer un compte"
      description: |
        Statut : **Disponible**

        Supprime un compte de manière logique.

        L'API passe le compte au statut `2` et renseigne `deletedAt`.

        Accès : réservé au rôle `admin`.
      operationId: deleteCompanyAccount
      x-availability: disponible
      parameters:
        - $ref: "#/components/parameters/CompanyIdParam"
        - $ref: "#/components/parameters/AdminId"
      responses:
        "200":
          description: Compte supprimé logiquement
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: "#/components/schemas/Account"
        "400":
          description: Paramètres invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Accès interdit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Compagnie ou compte introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /companies/{companyId}/admins/{adminId}/status:
    patch:
      tags:
        - Accounts
      summary: "[DISPONIBLE] Modifier le statut d'un compte"
      description: |
        Statut : **Disponible**

        Met à jour uniquement le statut d'un compte administrateur.

        Statuts :
        - `0` : inactif
        - `1` : actif
        - `2` : supprimé

        Si le statut passe à `2`, `deletedAt` est renseigné.

        Accès : réservé au rôle `admin`.
      operationId: updateCompanyAccountStatus
      x-availability: disponible
      parameters:
        - $ref: "#/components/parameters/CompanyIdParam"
        - $ref: "#/components/parameters/AdminId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusRequest"
      responses:
        "200":
          description: Statut du compte modifié
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: "#/components/schemas/Account"
        "400":
          description: Paramètres ou corps de requête invalides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "403":
          description: Accès interdit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Compagnie ou compte introuvable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    /dashboard/stats:
    get:
      tags:
        - Dashboard
      summary: "[NON DISPONIBLE] Récupérer les statistiques du dashboard"
      description: |
        Statut : **Non disponible**

        Route prévue pour afficher les indicateurs principaux du backoffice :
        - nombre de compagnies
        - nombre de comptes
        - nombre de joueurs
        - nombre de parties
        - activité récente
      operationId: getDashboardStats
      x-availability: non_disponible
      x-us: "US Dashboard / statistiques"
      responses:
        "200":
          description: Statistiques du dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "501":
          description: Route prévue mais pas encore implémentée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplementedResponse"

  /players:
    get:
      tags:
        - Players
      summary: "[NON DISPONIBLE] Lister les joueurs"
      description: |
        Statut : **Non disponible**

        Route prévue pour la gestion des joueurs/utilisateurs finaux.
      operationId: listPlayers
      x-availability: non_disponible
      x-us: "US Gestion des joueurs"
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Recherche par pseudo, email ou nom
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Status"
      responses:
        "200":
          description: Liste des joueurs
          content:
            application/json:
              schema:
                type: object
                properties:
                  players:
                    type: array
                    items:
                      $ref: "#/components/schemas/Player"
        "501":
          description: Route prévue mais pas encore implémentée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplementedResponse"

    post:
      tags:
        - Players
      summary: "[NON DISPONIBLE] Créer un joueur"
      description: |
        Statut : **Non disponible**

        Route prévue pour créer manuellement un joueur depuis le backoffice.
      operationId: createPlayer
      x-availability: non_disponible
      x-us: "US Gestion des joueurs"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlayerRequest"
      responses:
        "201":
          description: Joueur créé
          content:
            application/json:
              schema:
                type: object
                properties:
                  player:
                    $ref: "#/components/schemas/Player"
        "501":
          description: Route prévue mais pas encore implémentée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplementedResponse"

  /players/{playerId}:
    get:
      tags:
        - Players
      summary: "[NON DISPONIBLE] Récupérer un joueur"
      description: |
        Statut : **Non disponible**

        Route prévue pour consulter le détail d'un joueur.
      operationId: getPlayerById
      x-availability: non_disponible
      x-us: "US Gestion des joueurs"
      parameters:
        - $ref: "#/components/parameters/PlayerId"
      responses:
        "200":
          description: Joueur récupéré
          content:
            application/json:
              schema:
                type: object
                properties:
                  player:
                    $ref: "#/components/schemas/Player"
        "501":
          description: Route prévue mais pas encore implémentée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplementedResponse"

    patch:
      tags:
        - Players
      summary: "[NON DISPONIBLE] Modifier un joueur"
      description: |
        Statut : **Non disponible**

        Route prévue pour modifier les informations d'un joueur.
      operationId: updatePlayer
      x-availability: non_disponible
      x-us: "US Gestion des joueurs"
      parameters:
        - $ref: "#/components/parameters/PlayerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlayerRequest"
      responses:
        "200":
          description: Joueur modifié
          content:
            application/json:
              schema:
                type: object
                properties:
                  player:
                    $ref: "#/components/schemas/Player"
        "501":
          description: Route prévue mais pas encore implémentée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplementedResponse"

    delete:
      tags:
        - Players
      summary: "[NON DISPONIBLE] Supprimer un joueur"
      description: |
        Statut : **Non disponible**

        Route prévue pour supprimer logiquement un joueur.
      operationId: deletePlayer
      x-availability: non_disponible
      x-us: "US Gestion des joueurs"
      parameters:
        - $ref: "#/components/parameters/PlayerId"
      responses:
        "200":
          description: Joueur supprimé logiquement
          content:
            application/json:
              schema:
                type: object
                properties:
                  player:
                    $ref: "#/components/schemas/Player"
        "501":
          description: Route prévue mais pas encore implémentée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotImplementedResponse"

  /players/{playerId}/status:
    patch:
      tags:
        - Players
      summary: "[NON DISPONIBLE] Modifier le statut d'un joueur"
      description: |
        Statut : **Non disponible**

        Route prévue pour activer, désactiver ou supprimer logiquement un joueur.
      operationId: updatePlayerStatus
      x-availability: non_disponible
      x-us: "US Gestion des joueurs"
      parameters:
        - $ref: "#/components/parameters/PlayerId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusRequest"
      responses:
        "200":
          description: Statut du joueur modifié
          content:
            application/json:
              schema:
                type: object
                properties:
                  player:
                    $ref: "#/components/schemas/Player"
        "501":
          description: Route prévue mais pas encore implémentée
          content:
