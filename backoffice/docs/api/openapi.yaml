components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CompanyId:
      name: id
      in: path
      required: true
      description: Identifiant de la compagnie
      schema:
        type: integer
        example: 1

    CompanyIdParam:
      name: companyId
      in: path
      required: true
      description: Identifiant de la compagnie
      schema:
        type: integer
        example: 1

    AdminId:
      name: adminId
      in: path
      required: true
      description: Identifiant du compte administrateur
      schema:
        type: integer
        example: 1

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: not_found

    ValidationError:
      type: object
      description: Erreur de validation retournée par Zod ou par l'API
      additionalProperties: true

    Status:
      type: integer
      enum:
        - 0
        - 1
        - 2
      description: |
        Statut :
        - `0` : inactif
        - `1` : actif
        - `2` : supprimé

    LoginRequest:
      type: object
      required:
        - identifier
        - password
      properties:
        identifier:
          type: string
          description: Email ou nom d'utilisateur
          example: admin@quizzup.fr
        password:
          type: string
          format: password
          example: password123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: Token JWT
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        admin:
          $ref: "#/components/schemas/AuthAdmin"

    AuthAdmin:
      type: object
      properties:
        id:
          type: integer
          example: 1
        company_id:
          type: integer
          example: 1
        role:
          type: string
          example: admin
        firstname:
          type: string
          example: Enzo
        lastname:
          type: string
          example: Drissi
        username:
          type: string
          example: enzod
        email:
          type: string
          format: email
          example: enzo@quizzup.fr

    MeAdmin:
      type: object
      properties:
        id:
          type: integer
          example: 1
        company_id:
          type: integer
          example: 1
        role:
          type: string
          example: admin
        firstname:
          type: string
          nullable: true
          example: Enzo
        lastname:
          type: string
          nullable: true
          example: Drissi
        username:
          type: string
          example: enzod
        email:
          type: string
          format: email
          example: enzo@quizzup.fr
        status:
          $ref: "#/components/schemas/Status"
        created_at:
          type: string
          format: date-time
          example: "2026-05-19T10:00:00.000Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-05-19T10:00:00.000Z"

    Company:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: QuizzUp
        email:
          type: string
          format: email
          example: contact@quizzup.fr
        status:
          $ref: "#/components/schemas/Status"
        createdAt:
          type: string
          format: date-time
          example: "2026-05-19T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-05-19T10:00:00.000Z"
        deletedAt:
          type: string
          format: date-time
          nullable: true
          example: null
        accountsCount:
          type: integer
          example: 3

    CreateCompanyRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
          example: QuizzUp
        email:
          type: string
          format: email
          maxLength: 255
          example: contact@quizzup.fr

    UpdateCompanyRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
          example: QuizzUp
        email:
          type: string
          format: email
          maxLength: 255
          example: contact@quizzup.fr
        status:
          $ref: "#/components/schemas/Status"

    UpdateStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/Status"

    DeleteCompanyResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        deleted:
          type: object
          properties:
            companyId:
              type: integer
              example: 1
            adminsCount:
              type: integer
              example: 0
            companiesCount:
              type: integer
              example: 1

    Account:
      type: object
