services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quizzup
      POSTGRES_PASSWORD: quizzup
      POSTGRES_DB: quizzup_backoffice
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U quizzup -d quizzup_backoffice']
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://quizzup:quizzup@postgres:5432/quizzup_backoffice
      API_PORT: '3001'
      CORS_ORIGIN: 'http://localhost:4173'
      JWT_SECRET: 'change_me_super_secret'
      JWT_EXPIRES_IN: '2h'
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/workspace/backend
      - ./shared:/workspace/shared
      - ./docs:/workspace/docs:ro
      - ./tests:/workspace/tests
      - backend_node_modules:/workspace/backend/node_modules
      - shared_node_modules:/workspace/shared/node_modules
    working_dir: /workspace/backend
    command: >
      sh -c "
        npm --prefix ../shared install &&
        npm --prefix ../shared run build &&
        test -d node_modules || npm install &&
        npm run migrate &&
        npm run seed &&
        npm run dev
      "

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_URL: 'http://localhost:3001'
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '4173:5173'
    depends_on:
      - backend
    volumes:
      - ./frontend:/workspace/frontend
      - ./shared:/workspace/shared
      - ./tests:/workspace/tests
      - frontend_node_modules:/workspace/frontend/node_modules
      - shared_node_modules:/workspace/shared/node_modules
    working_dir: /workspace/frontend
    command: >
      sh -c "
        npm --prefix ../shared install &&
        npm --prefix ../shared run build &&
        test -d node_modules || npm install &&
        npm run dev -- --host 0.0.0.0 --port 5173
      "

  tests:
    image: node:20-alpine
    working_dir: /workspace
    environment:
      DATABASE_URL: postgresql://quizzup:quizzup@postgres:5432/quizzup_backoffice
      API_PORT: '3001'
      CORS_ORIGIN: 'http://localhost:4173'
      JWT_SECRET: 'change_me_super_secret'
      JWT_EXPIRES_IN: '2h'
      VITE_API_URL: 'http://backend:3001'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/workspace
      - root_node_modules:/workspace/node_modules
      - backend_node_modules:/workspace/backend/node_modules
      - frontend_node_modules:/workspace/frontend/node_modules
      - shared_node_modules:/workspace/shared/node_modules
    command: >
      sh -c "
        npm --prefix shared install &&
        npm --prefix shared run build &&
        npm --prefix backend install &&
        npm --prefix frontend install &&
        npm install &&
        npm run test
      "

volumes:
  pgdata:
  root_node_modules:
  backend_node_modules:
  frontend_node_modules:
  shared_node_modules:
